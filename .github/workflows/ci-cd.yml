name: CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: hastakala-ai-pipeline
  DOCR_REGISTRY_NAME: hastakala-ai-pipeline

jobs:
  test:
    name: Test Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --provenance=false -t $IMAGE_NAME:test .

      - name: Smoke test CLI
        run: docker run --rm $IMAGE_NAME:test --help

  push-to-digitalocean:
    name: Push to DigitalOcean Container Registry
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and tag image
        run: |
          docker build --provenance=false -t registry.digitalocean.com/$DOCR_REGISTRY_NAME/$IMAGE_NAME:${{ github.sha }} .
          docker tag registry.digitalocean.com/$DOCR_REGISTRY_NAME/$IMAGE_NAME:${{ github.sha }} registry.digitalocean.com/$DOCR_REGISTRY_NAME/$IMAGE_NAME:latest

      - name: Push image
        run: |
          docker push registry.digitalocean.com/$DOCR_REGISTRY_NAME/$IMAGE_NAME:${{ github.sha }}
          docker push registry.digitalocean.com/$DOCR_REGISTRY_NAME/$IMAGE_NAME:latest

  deploy-droplet:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: push-to-digitalocean
    if: vars.DEPLOY_TO_DROPLET == 'true'
    env:
      IMAGE: registry.digitalocean.com/hastakala-ai-pipeline/hastakala-ai-pipeline:latest
      DROPLET_HOST: ${{ vars.DROPLET_HOST }}
      DROPLET_USER: ${{ vars.DROPLET_USER }}
    steps:
      - name: Validate deploy configuration
        run: |
          if [ -z "${{ secrets.DROPLET_SSH_PRIVATE_KEY }}" ]; then
            echo "Missing repository secret: DROPLET_SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" ]; then
            echo "Missing repository secret: DIGITALOCEAN_ACCESS_TOKEN" >&2
            exit 1
          fi
          if [ -z "$DROPLET_HOST" ]; then
            echo "Missing repository variable: DROPLET_HOST" >&2
            exit 1
          fi
          if [ -z "$DROPLET_USER" ]; then
            echo "Missing repository variable: DROPLET_USER" >&2
            exit 1
          fi
          if [ -z "$IMAGE" ]; then
            echo "Missing deployment image." >&2
            exit 1
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}

      - name: Run pipeline on Droplet
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$DROPLET_USER@$DROPLET_HOST" <<'EOF'
            set -euo pipefail
            IMAGE="registry.digitalocean.com/hastakala-ai-pipeline/hastakala-ai-pipeline:latest"
            DO_TOKEN='${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}'

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not installed on Droplet" >&2
              exit 1
            fi

            echo "$DO_TOKEN" | docker login registry.digitalocean.com -u "$DO_TOKEN" --password-stdin
            docker pull "$IMAGE"

            docker run --rm \
              --env-file /opt/hastakala-ai-pipeline/.env \
              -v /opt/hastakala-ai-pipeline/assets:/app/assets \
              -v /opt/hastakala-ai-pipeline/output:/app/output \
              -v /opt/hastakala-ai-pipeline/submissions.csv:/app/submissions.csv:ro \
              "$IMAGE" \
              --input /app/submissions.csv \
              --output /app/output/products.txt \
              --assets-root /app/assets/products
          EOF
